<!-- ============================================================
     BOWL DETAIL PAGE — standalone, self-contained
 
     HOW TO ADD YOUR ITEMS:
     Scroll down to the "ALL CATEGORY DATA" block below. Each
     category is its own <div class="rc-category" data-category="...">.
     Inside it, add one <div class="rc-item" data-name="..."> PER
     BOWL, with a normal <img src="..."> inside it — data-name
     must match the name shown on your menu page.
 
     Example:
       <div class="rc-item" data-name="Ruby Bloom">
         <img src="img/ruby-bloom.png" alt="Ruby Bloom">
       </div>
 
     No JavaScript editing needed — just copy/paste more rc-item
     divs and swap the name + image.
     ============================================================ -->
 
<div class="rc-detail">
 
  <a href="bowls.html" class="rc-detail-back">
    <svg viewBox="0 0 24 24"><path d="M15 6l-6 6 6 6"/></svg>
    Back to Menu
  </a>
 
  <div class="rc-detail-stage" id="rcStage">
    <div class="rc-page rc-page-back" id="rcPageBack">
      <img class="rc-page-photo" id="rcPhotoBack" src="" alt="">
    </div>
    <div class="rc-page rc-page-front" id="rcPageFront">
      <img class="rc-page-photo" id="rcPhotoFront" src="" alt="">
    </div>
  </div>
 
  <button class="rc-nav-zone rc-nav-prev" id="rcPrevBtn" aria-label="Previous">
    <svg viewBox="0 0 24 24"><path d="M15 6l-6 6 6 6"/></svg>
  </button>
  <button class="rc-nav-zone rc-nav-next" id="rcNextBtn" aria-label="Next">
    <svg viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg>
  </button>
 
  <div class="rc-detail-counter" id="rcCounter"></div>
 <div class="rc-detail-actions" id="rcActions">
    <button class="rc-fav-btn" id="rcFavBtn" aria-label="Add to favorites">
      <svg viewBox="0 0 24 24"><path d="M12 21s-7-4.35-9.5-9A5.5 5.5 0 0 1 12 6a5.5 5.5 0 0 1 9.5 6C19 16.65 12 21 12 21z"/></svg>
    </button>
    <button class="rc-cart-btn" id="rcCartBtn">
      <svg viewBox="0 0 24 24"><path d="M3 3h2l2.4 12.2a2 2 0 0 0 2 1.8h8.2a2 2 0 0 0 2-1.6L21 8H6"/><circle cx="9" cy="20" r="1"/><circle cx="18" cy="20" r="1"/></svg>
      Add to Cart
    </button>
   
  </div>

  <div class="rc-customize-prompt" id="rcCustomizePrompt" style="display:none;">
      <span>Customize this bowl?</span>
      <button class="rc-cp-yes" id="rcCustomizeYes">Yes</button>
      <button class="rc-cp-skip" id="rcCustomizeSkip">Skip</button>
    </div>
  </div>

 <div class="rc-view-cart-toast" id="rcViewCartToast" style="display:none;">
    <span id="rcToastText">Added to cart</span>
    <a href="cart.html" class="rc-toast-link">View Cart →</a>
  </div>
 


  <div class="rc-detail-empty" id="rcEmptyState" style="display:none;">
    <p>No bowl selected yet.</p>
    <a href="bowls.html" class="rc-empty-btn">Go to Menu →</a>
  </div>
 
</div>
